#   markdown_headings — 按 ## 拆，每段是一条
#   csv — 第一行表头，含 act / prompt 列（如 awesome-chatgpt-prompts/prompts.csv）
#   jupyter_notebook — .ipynb JSON，从 markdown cells 抽取后再走 headings

source:
